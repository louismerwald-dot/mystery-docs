name: daily-mystery

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  produce:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          YT_CLIENT_ID:      ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET:  ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN:  ${{ secrets.YT_REFRESH_TOKEN }}
        run: python pipeline.py

      - name: Commit state
        run: |
          git config user.name  "mystery-docs-bot"
          git config user.email "mystery-docs-bot@users.noreply.github.com"
          git add state.json || true
          git diff --cached --quiet || git commit -m "state: log used topic"
          git push || true
